services:
  app:
    build: .
    container_name: my_fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 512M    # 限制 FastAPI 最多用 512MB

  redis:
    image: redis:alpine
    container_name: my_redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M    # Redis 很省，128MB 足够

  db:
    image: mysql:8.0
    container_name: my_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: news_app
      MYSQL_USER: myuser
      MYSQL_PASSWORD: 123456
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M    # MySQL 给 512MB，通常够用